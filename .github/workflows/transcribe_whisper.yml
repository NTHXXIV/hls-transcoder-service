name: Media Transcription (Whisper)

on:
  repository_dispatch:
    types: [build-transcription]

jobs:
  whisper:
    name: Whisper Transcription
    # Chỉ chạy nếu không có stage=clean (đây là luồng mặc định)
    if: github.event.client_payload.stage != 'clean'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Cache Whisper Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface 
          key: ${{ runner.os }}-whisper-models-${{ github.event.client_payload.model_size || 'medium' }}
          restore-keys: |
            ${{ runner.os }}-whisper-models-

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node Dependencies
        run: npm ci || npm install

      - name: Run Whisper
        env:
          TRANSCODER_PRIVATE_KEY: ${{ secrets.TRANSCODER_PRIVATE_KEY }}
          HLS_CALLBACK_SECRET: ${{ secrets.HLS_CALLBACK_SECRET }}
          ALLOWED_CALLBACK_DOMAINS: ${{ secrets.ALLOWED_CALLBACK_DOMAINS }}
          HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_SANDBOX }}
          HLS_CALLBACK_SECRET_STAGAPPS_PROD: ${{ secrets.HLS_CALLBACK_SECRET_STAGAPPS_PROD }}
          PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
        run: |
          node -e "require('fs').writeFileSync('payload.json', process.env.PAYLOAD_JSON)"
          npx tsx src/transcribe/index.ts payload.json --whisper
